# 工作流名称
name: Build Android Debug APK

# 触发条件：当推送到main分支或创建PR时触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 也可以手动触发
  workflow_dispatch:

# 工作流任务
jobs:
  build:
    # 运行环境
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置JDK环境（安卓构建需要JDK 17）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予gradlew执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. 构建Debug版本APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. 上传构建产物（让APK可下载）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          # 工件名称，便于识别
          name: app-debug-apk
          # Debug APK的默认输出路径（根据你的项目结构调整）
          path: |
            app/build/outputs/apk/debug/DEBUG.apk
          # 工件保留时间（默认90天，可自定义）
          retention-days: 30
